name: futurekawa

services:
  postgres:
    image: postgres:16-alpine
    container_name: futurekawa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: MSPR_TPRE814_Bresil
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MSPR_TPRE814_Bresil"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: futurekawa-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@futurekawa.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  db-init:
    build:
      context: ./FutureKawaBresil_API
    container_name: futurekawa-db-init
    command: python reset_db.py
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/MSPR_TPRE814_Bresil
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./FutureKawaBresil_API
    container_name: futurekawa-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:root@postgres:5432/MSPR_TPRE814_Bresil
      DEBUG: "True"
      NOM_PAYS: "Brésil"
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./FutureKawa_Frontend
    container_name: futurekawa-frontend
    environment:
      NUXT_API_BRESIL_URL: http://backend:8000/api/v1
      NUXT_API_COLOMBIE_URL: http://localhost:8001/api/v1
      NUXT_API_EQUATEUR_URL: http://localhost:8002/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: futurekawa-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  mqtt-bridge:
    build:
      context: ./mqtt-bridge
    container_name: futurekawa-mqtt-bridge
    environment:
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: "1883"
      API_URL: http://backend:8000/api/v1/releves/
    depends_on:
      - mqtt-broker
      - backend
    restart: unless-stopped

  iot-simulator:
    build:
      context: ./iot-simulator
    container_name: futurekawa-iot-simulator
    environment:
      MQTT_BROKER: mqtt-broker
      MQTT_PORT: "1883"
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  jenkins:
    build:
      context: ./jenkins
    container_name: futurekawa-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/casc.yaml:ro
    environment:
      CASC_JENKINS_CONFIG: /casc.yaml
    group_add:
      - "0"
    restart: unless-stopped

volumes:
  pgdata:
  mosquitto-data:
  mosquitto-log:
  jenkins-data:
